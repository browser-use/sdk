name: Daily UX Tests

on:
  schedule:
    # Every day at 08:00 UTC (morning EU, night US)
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      site:
        description: "Filter by site (e.g. 'docs', 'cloud')"
        required: false
      flow:
        description: "Filter by flow name (e.g. 'homepage')"
        required: false

permissions:
  contents: read

jobs:
  ux-tests:
    name: Run UX Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install SDK dependencies
        working-directory: browser-use-node
        run: pnpm install --frozen-lockfile

      - name: Install UX test dependencies
        working-directory: ux-tests
        run: |
          # Install without workspace protocol (CI doesn't use pnpm workspace)
          npm install --ignore-scripts dotenv zod tsx typescript
          # Link the local SDK
          npm link ../browser-use-node

      - name: Build SDK
        working-directory: browser-use-node
        run: pnpm build

      - name: Run UX tests
        working-directory: ux-tests
        env:
          BROWSER_USE_API_KEY: ${{ secrets.BROWSER_USE_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.site }}" ]; then ARGS="$ARGS --site ${{ inputs.site }}"; fi
          if [ -n "${{ inputs.flow }}" ]; then ARGS="$ARGS --flow ${{ inputs.flow }}"; fi
          npx tsx run.ts $ARGS

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ux-report-${{ github.run_id }}
          path: ux-tests/reports/
          retention-days: 90

      - name: Post failure to issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportDir = 'ux-tests/reports';
            const files = fs.readdirSync(reportDir).filter(f => f.endsWith('.json'));
            if (files.length === 0) return;

            const report = JSON.parse(fs.readFileSync(`${reportDir}/${files[files.length - 1]}`, 'utf-8'));
            const issues = report.results
              .filter(r => r.ux && !r.ux.passed || r.error)
              .map(r => {
                if (r.error) return `- **${r.name}** (${r.site}): ❌ Error — ${r.error}`;
                return `- **${r.name}** (${r.site}): score ${r.ux.score}/10\n  ${r.ux.issues.map(i => `  - ${i}`).join('\n')}`;
              })
              .join('\n');

            const title = `UX Test Failures — ${report.date}`;
            const body = `## Daily UX Test Report\n\n**${report.summary.passed}** passed, **${report.summary.failed}** failed, **${report.summary.errors}** errors\n**Average score:** ${report.summary.avgScore}/10\n\n### Failed Flows\n\n${issues}\n\n---\n*Auto-generated by daily UX tests. [View run](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ux', 'automated'],
            });

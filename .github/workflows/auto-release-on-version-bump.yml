name: auto-release-on-version-bump

# Watches main for version bumps in BOTH SDK manifests. If both moved to a new
# shared version and no Release for that version exists yet, creates a GitHub
# Release at the bump commit. That Release event triggers publish.yml, which
# runs preflight + the prod-deploy-style approval gate before actually publishing.

on:
  push:
    branches: [main]
    paths:
      - 'browser-use-node/package.json'
      - 'browser-use-python/pyproject.toml'

# Default permissions are read-only. The create-release job overrides what it needs.
permissions:
  contents: read

concurrency:
  # Serialize bump-detection per branch so two simultaneous merges can't race
  # to create duplicate Releases. cancel-in-progress is false so a long-running
  # detector isn't killed by a follow-up push.
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-and-release:
    name: Detect version bump and create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create the Release/tag
    steps:
      - name: Checkout (with previous commit for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version bump
        id: detect
        run: |
          set -euo pipefail

          # Read previous (HEAD~1) and current versions from both manifests.
          # git show prints the file at a given revision; safer than git diff for parsing.
          PREV_TS=$(git show HEAD~1:browser-use-node/package.json 2>/dev/null | jq -r .version || echo "missing")
          NEW_TS=$(jq -r .version browser-use-node/package.json)
          PREV_PY=$(git show HEAD~1:browser-use-python/pyproject.toml 2>/dev/null | grep -E '^version = ' | head -1 | sed -E 's/version = "(.*)"/\1/' || echo "missing")
          NEW_PY=$(grep -E '^version = ' browser-use-python/pyproject.toml | head -1 | sed -E 's/version = "(.*)"/\1/')

          echo "TS:  $PREV_TS -> $NEW_TS"
          echo "PY:  $PREV_PY -> $NEW_PY"

          # Both manifests must report the same new version. Mismatched bumps
          # likely come from a partial `task version:bump`; fail loud so the
          # author knows something is off before a Release/publish is attempted.
          if [ "$NEW_TS" != "$NEW_PY" ]; then
            echo "::error::TS package.json ($NEW_TS) and Python pyproject.toml ($NEW_PY) disagree. Run 'task version:bump' to sync both."
            exit 1
          fi

          # If the version didn't change in this push, this push wasn't a bump.
          # That's the common case (typical merges don't touch version fields).
          if [ "$NEW_TS" = "$PREV_TS" ] && [ "$NEW_PY" = "$PREV_PY" ]; then
            echo "::notice::No version bump detected ($NEW_TS unchanged). Skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Partial bump: one manifest moved, the other didn't. Bail loud.
          if [ "$NEW_TS" != "$PREV_TS" ] && [ "$NEW_PY" = "$PREV_PY" ]; then
            echo "::error::TS bumped ($PREV_TS -> $NEW_TS) but Python didn't ($PREV_PY). Run 'task version:bump' to keep them in sync."
            exit 1
          fi
          if [ "$NEW_TS" = "$PREV_TS" ] && [ "$NEW_PY" != "$PREV_PY" ]; then
            echo "::error::Python bumped ($PREV_PY -> $NEW_PY) but TS didn't ($PREV_TS). Run 'task version:bump' to keep them in sync."
            exit 1
          fi

          echo "::notice::Version bump detected: $PREV_TS -> $NEW_TS"
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "version=$NEW_TS" >> "$GITHUB_OUTPUT"

      - name: Skip if Release already exists for this version
        id: existence
        if: steps.detect.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.detect.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "v${VERSION}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "::notice::Release v${VERSION} already exists. Nothing to do."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release (fires publish.yml)
        if: steps.detect.outputs.should_release == 'true' && steps.existence.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.detect.outputs.version }}
        run: |
          set -euo pipefail
          # --target pins the Release to the exact commit that did the bump,
          # not whatever happens to be the head of main when this job runs.
          # That matters if other PRs land between the bump merge and this job
          # picking it up.
          gh release create "v${VERSION}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "v${VERSION}" \
            --target "${GITHUB_SHA}" \
            --generate-notes \
            --verify-tag=false
          echo "::notice::Created Release v${VERSION} at ${GITHUB_SHA}. publish.yml will fire on the 'release: published' event."
